<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Quản Lý Ngăn Chặn Đất Đai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
      }

      /* FIX: Buộc các thành phần form sử dụng color-scheme sáng 
         Điều này đảm bảo icon lịch (date picker) và mũi tên dropdown 
         luôn có màu đen, không bị biến thành màu trắng khi OS ở Dark Mode */
      input, select, textarea {
        color-scheme: light;
        color: #111827; /* Force text color to gray-900 */
        background-color: #ffffff; /* Force background to white */
      }

      /* Đảm bảo icon lịch luôn hiển thị rõ */
      input[type="date"]::-webkit-calendar-picker-indicator {
        opacity: 1;
        display: block;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
